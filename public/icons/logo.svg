<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <!-- Shared gradients (same as dark, different ids) -->
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e27a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8861e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2933"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background card (light) -->
  <rect x="0" y="0" width="520" height="120" rx="20" fill="#f9fafb"/>

  <!-- Mark: Rounded camera with live dot (same layout as dark) -->
  <g transform="translate(32 22)">
    <!-- Camera body -->
    <rect x="0" y="8" width="104" height="68" rx="18" fill="#ffffff" stroke="rgba(15,23,42,0.08)" stroke-width="1.5"/>
    <!-- Gradient lens ring -->
    <circle cx="52" cy="42" r="22" fill="none" stroke="url(#markGrad)" stroke-width="6"/>
    <!-- Inner lens -->
    <circle cx="52" cy="42" r="12" fill="#020617"/>
    <!-- Lens highlight -->
    <ellipse cx="46" cy="36" rx="6" ry="4" fill="#fefce8" opacity="0.32" transform="rotate(-25 46 36)"/>
    <!-- Top bar -->
    <rect x="14" y="2" width="38" height="10" rx="4" fill="rgba(15,23,42,0.08)"/>
    <!-- Live red dot -->
    <circle cx="92" cy="16" r="6.5" fill="#dc2626"/>
    <circle cx="92" cy="16" r="6.5" fill="none" stroke="#dc2626" stroke-width="1.5">
      <animate attributeName="r" values="6.5;11" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="92" cy="16" r="2.3" fill="#fee2e2" opacity="0.9"/>
  </g>

  <!-- Wordmark (same layout as dark; colors tuned for light bg) -->
  <g transform="translate(156 0)">
    <!-- Main text -->
    <text x="0" y="70" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="50" font-weight="300" fill="url(#textGrad)" letter-spacing="-1.2">
      <tspan font-weight="300">Live</tspan>
      <tspan font-weight="700" fill="url(#accentGrad)">Drop</tspan>
    </text>
    <!-- Underline accent -->
    <rect x="2" y="80" width="148" height="3" rx="1.5" fill="rgba(148,163,184,0.25)"/>
    <rect x="2" y="80" width="82" height="3" rx="1.5" fill="url(#accentGrad)"/>
    <!-- Tagline -->
    <text x="2" y="102" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" letter-spacing="3">REAL-TIME EVENT PHOTOS</text>
  </g>
</svg>
