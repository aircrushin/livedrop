<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Card + lens gradients, echoing logo-dark -->
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e27a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8861e"/>
    </linearGradient>
    <radialGradient id="cardGlow" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#020617"/>
  <rect width="512" height="512" rx="112" fill="url(#cardGlow)" opacity="0.75"/>

  <!-- Centered camera icon (no droplet) -->
  <g transform="translate(116 128)">
    <!-- Camera body card -->
    <rect x="0" y="40" width="280" height="200" rx="56" fill="#020617" stroke="rgba(248,250,252,0.06)" stroke-width="3"/>
    <!-- Top bar -->
    <rect x="54" y="18" width="80" height="20" rx="8" fill="rgba(248,250,252,0.12)"/>

    <!-- Lens outer ring -->
    <circle cx="140" cy="140" r="76" fill="rgba(15,23,42,0.95)" stroke="rgba(15,23,42,0.9)" stroke-width="4"/>
    <!-- Gradient accent ring -->
    <circle cx="140" cy="140" r="60" fill="none" stroke="url(#markGrad)" stroke-width="9"/>
    <!-- Inner lens -->
    <circle cx="140" cy="140" r="32" fill="#020617"/>
    <!-- Lens highlight -->
    <ellipse cx="126" cy="126" rx="14" ry="10" fill="#fefce8" opacity="0.32" transform="rotate(-25 126 126)"/>

    <!-- Live red dot (top-right) -->
    <g transform="translate(216 40)">
      <circle cx="0" cy="0" r="14" fill="#dc2626"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#dc2626" stroke-width="3">
        <animate attributeName="r" values="14;26" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="4.5" fill="#fee2e2" opacity="0.95"/>
    </g>
  </g>
</svg>
